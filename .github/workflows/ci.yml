name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install application and test dependencies
        run: python -m pip install --upgrade ".[dev]"
      - name: Run Python and skill contract tests
        run: python -m pytest -q tests mastery-ledger/tests
      - name: Compile Python sources
        run: python -m compileall -q src mastery-ledger/scripts

  frontend:
    name: Frontend contract and bundled assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install locked frontend dependencies
        working-directory: web
        run: npm ci
      - name: Run frontend tests
        working-directory: web
        run: npm test
      - name: Build bundled frontend
        working-directory: web
        run: npm run build
      - name: Require committed bundle to match source
        run: git diff --exit-code -- src/mastery_ledger/web
