name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Require tag and package versions to match
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if tag != f"v{version}":
              raise SystemExit(f"Tag {tag!r} does not match package version v{version}")
          PY
      - name: Build and verify frontend
        working-directory: web
        run: |
          npm ci
          npm test
          npm run build
      - name: Require committed bundle to match source
        run: git diff --exit-code -- src/mastery_ledger/web
      - name: Build and test Python distribution
        run: |
          python -m pip install --upgrade build
          python -m pip install --upgrade ".[dev]"
          python -m pytest -q tests mastery-ledger/tests
          python -m build
      - name: Package the matching Codex skill
        run: git archive --format=zip --output="dist/mastery-ledger-skill-$GITHUB_REF_NAME.zip" HEAD mastery-ledger
      - name: Upload Python and skill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-python
          path: dist/
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Require tag and package versions to match
        shell: pwsh
        run: |
          $version = python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }
      - name: Install desktop build dependencies
        run: python -m pip install --upgrade ".[desktop,desktop-build]"
      - name: Build Windows desktop preview
        run: python -m PyInstaller --noconfirm --clean .\packaging\mastery-ledger.spec
      - name: Add Windows runtime configuration
        shell: pwsh
        run: Copy-Item .\packaging\MasteryLedger.exe.config .\dist\MasteryLedger\MasteryLedger.exe.config
      - name: Smoke test packaged application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .work | Out-Null
          $process = Start-Process -FilePath .\dist\MasteryLedger\MasteryLedger.exe -ArgumentList "--smoke-test", "--output", ".\.work\desktop-smoke.json" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Packaged desktop smoke test exited with code $($process.ExitCode)" }
          Get-Content .\.work\desktop-smoke.json
          $result = Get-Content .\.work\desktop-smoke.json | ConvertFrom-Json
          if ($result.status -ne "ready") { throw "Packaged desktop smoke test did not report ready" }
      - name: Smoke test packaged Windows webview runtime
        shell: pwsh
        run: |
          $process = Start-Process -FilePath .\dist\MasteryLedger\MasteryLedger.exe -ArgumentList "--webview-smoke-test", "--output", ".\.work\webview-smoke.json" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Packaged webview smoke test exited with code $($process.ExitCode)" }
          Get-Content .\.work\webview-smoke.json
          $result = Get-Content .\.work\webview-smoke.json | ConvertFrom-Json
          if ($result.status -ne "ready" -or $result.webview -ne "ready") {
            throw "Packaged webview smoke test did not report ready"
          }
      - name: Archive portable Windows application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path .\dist\MasteryLedger\* -DestinationPath ".\release\MasteryLedger-windows-x64-${{ github.ref_name }}.zip"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" .\packaging\mastery-ledger.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }
      - name: Install and smoke test Windows installer
        shell: pwsh
        run: |
          $version = python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          $installer = (Resolve-Path ".\release\MasteryLedger-Setup-v$version.exe").Path
          $installRoot = Join-Path (Resolve-Path .\.work) "installer-smoke"
          $install = Start-Process -FilePath $installer -ArgumentList @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/CURRENTUSER",
            "/DIR=$installRoot"
          ) -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Installer exited with code $($install.ExitCode)" }
          if (-not (Test-Path "$installRoot\MasteryLedger.exe.config")) {
            throw "Installer did not deploy the Windows runtime configuration"
          }
          $smoke = Start-Process -FilePath "$installRoot\MasteryLedger.exe" -ArgumentList @(
            "--webview-smoke-test",
            "--output",
            ".\.work\installer-webview-smoke.json"
          ) -Wait -PassThru
          if ($smoke.ExitCode -ne 0) { throw "Installed webview smoke test exited with code $($smoke.ExitCode)" }
          Get-Content .\.work\installer-webview-smoke.json
          $uninstall = Start-Process -FilePath "$installRoot\unins000.exe" -ArgumentList @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART"
          ) -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "Uninstaller exited with code $($uninstall.ExitCode)" }
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-python, build-windows]
    steps:
      - name: Download Python and skill artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-python
          path: release/
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: release-windows
          path: release/
      - name: Create SHA-256 manifest
        run: sha256sum release/* > release/SHA256SUMS.txt
      - name: Attest release artifacts and checksum manifest
        uses: actions/attest@v4
        with:
          subject-path: "release/*"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "Mastery Ledger $GITHUB_REF_NAME"
