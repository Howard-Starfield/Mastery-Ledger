name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Require tag and package versions to match
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if tag != f"v{version}":
              raise SystemExit(f"Tag {tag!r} does not match package version v{version}")
          PY
      - name: Build and verify frontend
        working-directory: web
        run: |
          npm ci
          npm test
          npm run build
      - name: Require committed bundle to match source
        run: git diff --exit-code -- src/mastery_ledger/web
      - name: Build and test Python distribution
        run: |
          python -m pip install --upgrade build
          python -m pip install --upgrade ".[dev]"
          python -m pytest -q tests mastery-ledger/tests
          python -m build
      - name: Package the matching Codex skill
        run: git archive --format=zip --output="dist/mastery-ledger-skill-$GITHUB_REF_NAME.zip" HEAD mastery-ledger
      - name: Create SHA-256 manifest
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt
      - name: Attest distributions and checksum manifest
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"
      - name: Upload immutable workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mastery-ledger-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "Mastery Ledger $GITHUB_REF_NAME"
